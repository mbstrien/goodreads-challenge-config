name: Refresh challenge data

on:
  schedule:
    - cron: "0 8 1 1 *"
    - cron: "0 8 1 4 *"
    - cron: "0 8 1 7 *"
    - cron: "0 8 15 9 *"
  workflow_dispatch:
    inputs:
      blog_url:
        description: "Goodreads blog post URL for this season"
        required: false
        default: "https://www.goodreads.com/blog/show/3093"

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Run scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          BLOG_URL: ${{ github.event.inputs.blog_url || 'https://www.goodreads.com/blog/show/3093' }}
        run: node scripts/scrape.js
      - name: Commit updated challenges.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add challenges.json
          git diff --staged --quiet || git commit -m "chore: refresh challenge data $(date +%Y-%m-%d)"
          git push
